name: Deploy Landing Page to Strato

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via rsync
        env:
          SSHPASS:    ${{ secrets.SSH_PASSWORD }}
          SSH_HOST:   ${{ secrets.SSH_HOST }}
          SSH_PORT:   ${{ secrets.SSH_PORT || 22 }}
          SSH_USER:   ${{ secrets.SSH_USERNAME }}
          SSH_TARGET: ${{ secrets.SSH_TARGET_LANDING }}
        run: |
          sudo apt-get install -y sshpass
          USER=$(echo "$SSH_USER" | tr -d '[:space:]')
          HOST=$(echo "$SSH_HOST" | tr -d '[:space:]')
          TARGET=$(echo "$SSH_TARGET" | tr -d '[:space:]')
          PORT=$(echo "$SSH_PORT" | tr -d '[:space:]')
          sshpass -e rsync -rlgoDzvc --delete --mkpath \
            -e "ssh -p $PORT -o StrictHostKeyChecking=no -o UpdateHostKeys=no" \
            --exclude='.git*' --exclude='.github' \
            ./ "$USER@$HOST:$TARGET"
